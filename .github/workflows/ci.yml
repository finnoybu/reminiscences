name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  versioning:
    name: CI / versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate branch naming
        run: node scripts/validate-versioning.mjs

  content:
    name: CI / content-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - name: Validate frontmatter schema
        run: >
          if [ -d content/en ] && [ -f scripts/validate-frontmatter.mjs ]; then
            node scripts/validate-frontmatter.mjs;
          else
            echo "No content to validate yet.";
          fi

      - name: Verify content hashes
        run: >
          if [ -f scripts/hash-content.mjs ] && [ -f reports/content_hashes.sha256 ]; then
            node scripts/hash-content.mjs --verify;
          else
            echo "No hash verification configured.";
          fi

  build:
    name: CI / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - run: npm run build
